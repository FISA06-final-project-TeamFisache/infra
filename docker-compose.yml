services:
  postgres:
    image: postgres:16     # 일반 postgres 디비
    container_name: wooriport-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: wooriport
      POSTGRES_USER: wooriport
      POSTGRES_PASSWORD: wooriport1234
      TZ: Asia/Seoul                  # 한국 시간대(KST) 설정 추가
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # 초기 SQL
    restart: unless-stopped
    networks:
      - wooriport-network

  # 3. Kafka
  kafka:
    image: apache/kafka:3.7.2
    container_name: wooriport-kafka
    ports:
      - "9092:9092" # 외부 접속용 포트
      - "29092:29092" # 내부(도커 UI, 스프링) 접속용 포트
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    restart: unless-stopped
    networks:
      - wooriport-network

  # 4. Kafka UI 모니터링용 대시보드
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: wooriport-kafka-ui
    ports:
      - "8081:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=wooriport-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    depends_on:
      - kafka                         # 카프카가 먼저 실행된 후 실행되도록 설정
    restart: unless-stopped
    networks:
      - wooriport-network

volumes:
  postgres_data:
  redis_data:

networks:
  wooriport-network:                  # 공통 네트워크 정의
    driver: bridge