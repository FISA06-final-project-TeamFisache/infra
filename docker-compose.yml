services:
  postgres:
    image: postgres:16     # 일반 postgres 디비
    container_name: wooriport-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: wooriport
      POSTGRES_USER: wooriport
      POSTGRES_PASSWORD: wooriport1234
      TZ: Asia/Seoul                  # 한국 시간대(KST) 설정 추가
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # 초기 SQL
    restart: unless-stopped
    networks:
      - wooriport-network

  # 3. Kafka
  kafka:
    image: apache/kafka:3.7.2
    container_name: wooriport-kafka
    ports:
      - "9092:9092" # 외부 접속용 포트
      - "29092:29092" # 내부(도커 UI, 스프링) 접속용 포트
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    restart: unless-stopped
    networks:
      - wooriport-network

  # 4. Kafka UI 모니터링용 대시보드
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: wooriport-kafka-ui
    ports:
      - "8081:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=wooriport-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    depends_on:
      - kafka                         # 카프카가 먼저 실행된 후 실행되도록 설정
    restart: unless-stopped
    networks:
      - wooriport-network

  # ── ELK ──────────────────────────────────────────────────────────────────

  elasticsearch:
    image: elasticsearch:8.13.4
    container_name: wooriport-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE 'green|yellow'"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - wooriport-network

  logstash:
    image: logstash:8.13.4
    container_name: wooriport-logstash
    ports:
      - "9600:9600"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
      - ./logstash/logstash.yml:/usr/share/logstash/config/logstash.yml
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped
    networks:
      - wooriport-network

  kibana:
    image: kibana:8.13.4
    container_name: wooriport-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - wooriport-network

  # ── Metrics ──────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: wooriport-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - wooriport-network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: wooriport-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - wooriport-network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:

networks:
  wooriport-network:                  # 공통 네트워크 정의
    driver: bridge